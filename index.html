<!DOCTYPE html>
<html>
<head>
  <title>Team Dokumentasi</title>
  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    button { padding:10px 15px; margin:5px; cursor:pointer; }
    .file { margin:10px 0; padding:10px; background:#222; }
    input, select { padding:8px; margin:5px 0; }
    #loading { display:none; color:yellow; }
  </style>
</head>
<body>

<h2>📂 Dokumentasi Tim</h2>

<input type="password" id="teamPass" placeholder="Password Tim">
<button onclick="login()">Masuk</button>

<div id="app" style="display:none;">

  <h3>Upload File</h3>
  <input type="text" id="projectName" placeholder="Nama Proyek">
  <button onclick="openUpload()">Upload Foto / Video</button>

  <hr>

  <input type="text" id="search" placeholder="Cari file..." onkeyup="render()">

  <select id="sort" onchange="render()">
    <option value="new">Terbaru</option>
    <option value="old">Terlama</option>
  </select>

  <input type="date" id="filterDate" onchange="render()">

  <button onclick="downloadAll()">Download Semua</button>
  <p id="loading">⬇️ Sedang menyiapkan download...</p>

  <div id="files"></div>
</div>

<script>
const PASSWORD = "123456"; // GANTI PASSWORD TIM

let files = JSON.parse(localStorage.getItem("files")) || [];

function login(){
  if(document.getElementById("teamPass").value === PASSWORD){
    document.getElementById("app").style.display="block";
  } else {
    alert("Password salah");
  }
}

function openUpload(){
  const widget = cloudinary.createUploadWidget({
    cloudName: "dqyad2pn9",
    uploadPreset: "College_foto"
  }, (error, result) => {
    if(!error && result.event === "success"){
      files.push({
        url: result.info.secure_url,
        name: result.info.original_filename,
        date: new Date().toISOString(),
        project: document.getElementById("projectName").value
      });
      localStorage.setItem("files", JSON.stringify(files));
      render();
    }
  });
  widget.open();
}

function render(){
  let list = [...files];
  const search = document.getElementById("search").value.toLowerCase();
  const sort = document.getElementById("sort").value;
  const filterDate = document.getElementById("filterDate").value;

  if(search){
    list = list.filter(f => f.name.toLowerCase().includes(search));
  }

  if(filterDate){
    list = list.filter(f => f.date.startsWith(filterDate));
  }

  if(sort === "new"){
    list.sort((a,b)=> new Date(b.date)-new Date(a.date));
  } else {
    list.sort((a,b)=> new Date(a.date)-new Date(b.date));
  }

  const container = document.getElementById("files");
  container.innerHTML="";
  list.forEach(f=>{
    container.innerHTML += `
      <div class="file">
        📁 ${f.project || "-"} <br>
        📄 ${f.name} <br>
        📅 ${new Date(f.date).toLocaleString()} <br>
        <a href="${f.url}" target="_blank">Lihat</a>
      </div>
    `;
  });
}

function downloadAll(){
  document.getElementById("loading").style.display="block";
  files.forEach(f=>{
    const a = document.createElement("a");
    a.href = f.url;
    a.download = "";
    a.click();
  });
  setTimeout(()=>{
    document.getElementById("loading").style.display="none";
  },2000);
}

render();
</script>

</body>
</html>
