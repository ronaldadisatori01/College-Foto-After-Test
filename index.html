<!DOCTYPE html>
<html>
<head>
  <title>Team Gallery</title>
  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background:#0f0f0f;
      color:white;
    }

    header {
      padding:15px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#111;
      position:sticky;
      top:0;
      z-index:10;
      border-bottom:1px solid #222;
    }

    h2 { margin:0; }

    button {
      background:#1e88ff;
      border:none;
      padding:8px 14px;
      color:white;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover {
      opacity:0.9;
    }

    #gallery {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap:10px;
      padding:15px;
    }

    .card {
      position:relative;
      overflow:hidden;
      border-radius:12px;
      cursor:pointer;
    }

    .card img {
      width:100%;
      height:100%;
      object-fit:cover;
      transition:0.3s;
    }

    .card:hover img {
      transform:scale(1.05);
    }

    .overlay {
      position:absolute;
      bottom:0;
      left:0;
      right:0;
      padding:8px;
      background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      font-size:12px;
    }

    /* Fullscreen preview */
    #preview {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.9);
      justify-content:center;
      align-items:center;
      z-index:20;
    }

    #preview img {
      max-width:90%;
      max-height:90%;
      border-radius:12px;
    }

    #preview span {
      position:absolute;
      top:20px;
      right:30px;
      font-size:28px;
      cursor:pointer;
    }

  </style>
</head>
<body>

<header>
  <h2>📂 Team Gallery</h2>
  <div>
    <button onclick="openUpload()">Upload</button>
  </div>
</header>

<div id="gallery"></div>

<div id="preview" onclick="closePreview()">
  <span>✕</span>
  <img id="previewImg">
</div>

<script>

let files = [];

async function loadFiles() {
  try {
    const res = await fetch("https://res.cloudinary.com/dqyad2pn9/image/list/publik.json");
    const data = await res.json();

    files = data.resources.map(file => ({
      url: "https://res.cloudinary.com/dqyad2pn9/image/upload/" + file.public_id + "." + file.format,
      name: file.public_id.split("/").pop(),
      date: file.created_at
    }));

    render();
  } catch(err) {
    console.log("Belum ada file atau list belum aktif");
  }
}

function render(){
  const gallery = document.getElementById("gallery");
  gallery.innerHTML="";

  files.sort((a,b)=> new Date(b.date)-new Date(a.date));

  files.forEach(f=>{
    gallery.innerHTML += `
      <div class="card" onclick="openPreview('${f.url}')">
        <img src="${f.url}">
        <div class="overlay">
          ${new Date(f.date).toLocaleDateString()}
        </div>
      </div>
    `;
  });
}

function openPreview(url){
  document.getElementById("previewImg").src = url;
  document.getElementById("preview").style.display="flex";
}

function closePreview(){
  document.getElementById("preview").style.display="none";
}

function openUpload(){
  const widget = cloudinary.createUploadWidget({
    cloudName: "dqyad2pn9",
    uploadPreset: "College_foto",
    folder: "publik"
  }, (error, result) => {
    if(!error && result.event === "success"){
      loadFiles();
    }
  });
  widget.open();
}

loadFiles();

</script>

</body>
</html>
