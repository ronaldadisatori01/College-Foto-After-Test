<!DOCTYPE html>
<html>
<head>
<title>Galeri Publik</title>
<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:white;
}

header{
  padding:15px;
  font-size:18px;
  font-weight:bold;
}

button{
  margin:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#1e90ff;
  color:white;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:5px;
  padding:10px;
}

.gallery img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:8px;
}
</style>
</head>
<body>

<header>📸 Galeri Publik</header>

<button onclick="upload()">Upload Foto</button>

<div class="gallery" id="gallery"></div>

<script>
const cloudName = "dqyad2pn9";
const tagName = "publik";

function upload(){
  const widget = cloudinary.createUploadWidget({
    cloudName: cloudName,
    uploadPreset: "College_foto",
    tags: [tagName]
  }, (error, result) => {
    if(!error && result.event === "success"){
      loadImages();
    }
  });
  widget.open();
}

async function loadImages(){
  const res = await fetch(
    `https://res.cloudinary.com/${cloudName}/image/list/${tagName}.json`
  );
  const data = await res.json();

  const gallery = document.getElementById("gallery");
  gallery.innerHTML="";

  data.resources.forEach(img=>{
    gallery.innerHTML += `
      <a href="https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.jpg" target="_blank">
        <img src="https://res.cloudinary.com/${cloudName}/image/upload/w_400/${img.public_id}.jpg">
      </a>
    `;
  });
}

loadImages();
</script>

</body>
</html>
